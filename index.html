<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LarpGPT</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-elevated: #f4f4f5;
            --bg-composer: #f4f4f4;
            --border: #e6e6e6;
            --text: #0d0d0d;
            --text-muted: #6e6e80;
            --accent: #10a37f;
            --accent-text: #ffffff;
            --warn: #b45309;
            --danger: #d1293d;
            --focus-ring: rgba(16, 163, 127, 0.35);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #212121;
                --bg-elevated: #2f2f2f;
                --bg-composer: #2f2f2f;
                --border: #3a3a3a;
                --text: #ececec;
                --text-muted: #a0a0a8;
                --accent: #10a37f;
                --accent-text: #ffffff;
                --warn: #f0b429;
                --danger: #f2555f;
                --focus-ring: rgba(16, 163, 127, 0.45);
            }
        }
        :root[data-theme="dark"] {
            --bg: #212121;
            --bg-elevated: #2f2f2f;
            --bg-composer: #2f2f2f;
            --border: #3a3a3a;
            --text: #ececec;
            --text-muted: #a0a0a8;
            --accent: #10a37f;
            --accent-text: #ffffff;
            --warn: #f0b429;
            --danger: #f2555f;
            --focus-ring: rgba(16, 163, 127, 0.45);
        }
        :root[data-theme="light"] {
            --bg: #ffffff;
            --bg-elevated: #f4f4f5;
            --bg-composer: #f4f4f4;
            --border: #e6e6e6;
            --text: #0d0d0d;
            --text-muted: #6e6e80;
            --accent: #10a37f;
            --accent-text: #ffffff;
            --warn: #b45309;
            --danger: #d1293d;
            --focus-ring: rgba(16, 163, 127, 0.35);
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
        }

        .app {
            display: grid;
            grid-template-rows: auto 1fr auto;
            height: 100%;
        }

        /* ---- top bar ---- */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
        }
        .brand {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.01em;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .brand .model-tag {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 1px 8px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-muted);
            flex: none;
        }
        .status.loading .dot { background: var(--warn); animation: pulse 1.1s ease-in-out infinite; }
        .status.ready .dot { background: var(--accent); }
        .status.error .dot { background: var(--danger); }
        .status.error { color: var(--danger); }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }
        @media (prefers-reduced-motion: reduce) {
            .status.loading .dot { animation: none; }
        }

        /* ---- message list ---- */
        .chat {
            overflow-y: auto;
            max-width: 768px;
            width: 100%;
            margin: 0 auto;
            padding: 28px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .message.user { justify-content: flex-end; }

        /* avatar: JS always creates this as the first <span> in a message.
           real element children are matched by :first-child regardless of
           preceding text nodes, so this is safe for every message. */
        .message > span:first-child {
            flex: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-top: 2px;
        }
        .message.user > span:first-child { display: none; }

        .message > span:nth-child(2) {
            min-width: 0;
            font-size: 15px;
            line-height: 1.65;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-top: 3px;
        }
        .message.user > span:nth-child(2) {
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 10px 16px;
            max-width: 75%;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @media (prefers-reduced-motion: reduce) {
            .cursor { animation: none; }
        }

        .chat::-webkit-scrollbar { width: 8px; }
        .chat::-webkit-scrollbar-track { background: transparent; }
        .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ---- composer ---- */
        .composer {
            padding: 10px 20px 18px;
        }
        .toolbar {
            max-width: 768px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .temp-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .temp-control input[type="range"] {
            width: 110px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .temp-value {
            min-width: 28px;
            font-variant-numeric: tabular-nums;
            color: var(--text);
        }
        .toolbar-actions { display: flex; gap: 8px; }
        .ghost-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }
        .ghost-btn:hover { border-color: var(--text-muted); color: var(--text); }

        .input-area {
            max-width: 768px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-composer);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 6px 6px 6px 18px;
        }
        .input-area input {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            padding: 8px 0;
        }
        .input-area input::placeholder { color: var(--text-muted); }
        .input-area:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }
        .input-area button {
            flex: none;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: var(--text);
            color: var(--bg);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s, transform 0.1s;
        }
        .input-area button:hover:not(:disabled) { opacity: 0.85; }
        .input-area button:active:not(:disabled) { transform: scale(0.94); }
        .input-area button:disabled { opacity: 0.3; cursor: not-allowed; }

        .disclaimer {
            max-width: 768px;
            margin: 10px auto 0;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
        }

        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        /* ---- initial load progress ---- */
        .load-progress {
            height: 3px;
            background: transparent;
            overflow: hidden;
        }
        .load-progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.15s ease-out;
        }
        .load-progress.done { display: none; }
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="brand">LarpGPT <span class="model-tag">CPU model</span></div>
        <div id="status" class="status loading">
            <span class="dot"></span>
            <span id="statusText">Loading model…</span>
        </div>
    </header>
    <div id="loadProgress" class="load-progress"><div id="loadProgressBar" class="load-progress-bar"></div></div>

    <main id="chatBox" class="chat">
        <div class="message assistant"><span>🤖</span><span>Ready. Enter a message to start chatting.</span></div>
    </main>

    <footer class="composer">
        <div class="toolbar">
            <label class="temp-control">
                Temperature
                <input type="range" id="temperatureSlider" min="0.1" max="1.5" step="0.05" value="0.1">
                <span class="temp-value" id="tempDisplay">0.10</span>
            </label>
            <div class="toolbar-actions">
                <button id="clearBtn" class="ghost-btn">Clear chat</button>
                <button id="resetBtn" class="ghost-btn">Reset model</button>
            </div>
        </div>
        <div class="input-area">
            <input id="userInput" type="text" placeholder="Message LarpGPT…" autofocus>
            <button id="sendBtn" aria-label="Send message">↑</button>
        </div>
        <div class="disclaimer">Built with Larp Torch — runs entirely in your browser (Rust + WebAssembly, CPU).</div>
    </footer>
</div>

<script type="module">
    import init, { ChatModel } from './pkg/larp_torch_website.js?v=3d2a5c24aaba';

    // --- DOM refs ---
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const loadProgress = document.getElementById('loadProgress');
    const loadProgressBar = document.getElementById('loadProgressBar');
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resetBtn = document.getElementById('resetBtn');
    const tempSlider = document.getElementById('temperatureSlider');
    const tempDisplay = document.getElementById('tempDisplay');

    // --- State ---
    let model = null;
    let isGenerating = false;
    let cancelRequested = false; // set when the user clicks into the input mid-reply
    let conversation = []; // array of { role: 'user'|'assistant', text: string }
    let generationBuffer = '';

    // --- Status updates ---
    function setStatus(message, type = 'loading') {
        statusEl.className = `status ${type}`;
        statusText.textContent = message;
    }

    function appendMessage(role, text, isStreaming = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;

        const label = document.createElement('span');
        label.textContent = role === 'user' ? '👤' : '🤖';
        msgDiv.appendChild(label);

        const contentSpan = document.createElement('span');
        contentSpan.textContent = text;
        msgDiv.appendChild(contentSpan);

        // Remove any existing streaming cursor
        const lastMsg = chatBox.lastElementChild;
        if (lastMsg && lastMsg.querySelector('.cursor')) {
            lastMsg.remove();
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        if (isStreaming) {
            // Add cursor
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            msgDiv.appendChild(cursor);
        }

        return contentSpan;
    }

    function updateStreamingMessage(text) {
        const lastMsg = chatBox.lastElementChild;
        if (!lastMsg) return;

        const contentSpan = lastMsg.querySelector('span:last-child');
        if (contentSpan && !contentSpan.classList.contains('cursor')) {
            contentSpan.textContent = text;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeCursor() {
        const lastMsg = chatBox.lastElementChild;
        if (lastMsg) {
            const cursor = lastMsg.querySelector('.cursor');
            if (cursor) cursor.remove();
        }
    }

    function addUserMessage(text) {
        conversation.push({ role: 'user', text });
        appendMessage('user', text);
        userInput.value = '';
        // userInput stays enabled during generation on purpose — clicking
        // into it is how you interrupt a reply, see the focus listener below.
        sendBtn.disabled = true;
    }

    function addAssistantMessage(text) {
        conversation.push({ role: 'assistant', text });
        appendMessage('assistant', text);
        sendBtn.disabled = false;
        userInput.focus();
    }

    import { get_embedded_weights, get_embedded_vocab } from './pkg/larp_torch_website.js?v=3d2a5c24aaba';

    // Fetches a URL ourselves (instead of letting wasm-bindgen's init() do
    // it internally) so we can read real download progress off the
    // response stream — Content-Length vs bytes-read-so-far, not a fake
    // animated bar. Falls back to a plain await if the server ever omits
    // Content-Length (GitHub Pages sends it for static files, so this
    // should be the common path).
    async function fetchWithProgress(url, onProgress) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`fetch ${url} failed: ${response.status}`);
        const total = parseInt(response.headers.get('Content-Length') || '0', 10);
        if (!total || !response.body) {
            return response.arrayBuffer();
        }
        const reader = response.body.getReader();
        const chunks = [];
        let loaded = 0;
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value);
            loaded += value.length;
            onProgress(loaded, total);
        }
        const bytes = new Uint8Array(loaded);
        let offset = 0;
        for (const chunk of chunks) {
            bytes.set(chunk, offset);
            offset += chunk.length;
        }
        return bytes.buffer;
    }

    async function loadModel() {
        try {
            const t0 = performance.now();
            const wasmBytes = await fetchWithProgress(
                './pkg/larp_torch_website_bg.wasm?v=3d2a5c24aaba',
                (loaded, total) => {
                    const pct = Math.round((loaded / total) * 100);
                    loadProgressBar.style.width = pct + '%';
                    setStatus(`Downloading model… ${pct}%`, 'loading');
                }
            );
            const t1 = performance.now();
            await init(wasmBytes); // ArrayBuffer, not a URL — no second fetch
            const t2 = performance.now();
            setStatus('Starting up…', 'loading');
            const weights = get_embedded_weights();
            const vocabText = get_embedded_vocab();
            const t3 = performance.now();
            // ChatModel.load is a synchronous Rust call under the hood (see
            // src/lib.rs) — this is the part that blocks the main thread.
            model = await ChatModel.load(weights, vocabText);
            const t4 = performance.now();
            console.log(`[load timing] download: ${(t1 - t0).toFixed(0)}ms, `
                + `wasm compile+instantiate: ${(t2 - t1).toFixed(0)}ms, `
                + `unpack weights: ${(t3 - t2).toFixed(0)}ms, `
                + `build net + load weights (blocking): ${(t4 - t3).toFixed(0)}ms`);
            setStatus('Model ready', 'ready');
            loadProgress.classList.add('done');
        } catch (error) {
            console.error('Model load error:', error);
            setStatus('Failed to load model: ' + error.message, 'error');
        }
    }

    // --- Generation ---
    // next_token() is a synchronous Rust call now (not real async), so
    // `await`ing it doesn't yield to the browser's paint cycle — without
    // this, the DOM gets updated 50 times but the browser never actually
    // paints any of it until the loop's done, so it looks like one long
    // freeze followed by the whole reply appearing at once. sleep() forces
    // a real yield between tokens, which both fixes that and paces the
    // reply out like it's being typed.
    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function generateResponse(prompt) {
        if (!model || isGenerating) return;
        if (!prompt.trim()) return;

        isGenerating = true;
        cancelRequested = false;
        addUserMessage(prompt);

        // Seed the model with the prompt
        const recognized = model.seed(`task "${prompt}" `);
        if (recognized === 0) {
            addAssistantMessage("I don't recognize any words in that message. Please try different wording.");
            isGenerating = false;
            return;
        }

        // Start assistant message with streaming
        const temp = parseFloat(tempSlider.value);
        let fullResponse = '';
        let msgElement = null;
        let firstToken = true;

        try {
            // Generate up to 50 tokens, or until interrupted
            for (let i = 0; i < 50; i++) {
                if (cancelRequested) break;
                const rand = Math.random();
                const token = await model.next_token(temp, rand);

                if (token === '' || token === '\n') break;

                fullResponse += (firstToken ? '' : ' ') + token;
                firstToken = false;

                // Update streaming display
                if (!msgElement) {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message assistant';
                    const label = document.createElement('span');
                    label.textContent = '🤖';
                    msgDiv.appendChild(label);
                    const contentSpan = document.createElement('span');
                    contentSpan.textContent = fullResponse;
                    msgDiv.appendChild(contentSpan);
                    // Add cursor
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    msgDiv.appendChild(cursor);
                    chatBox.appendChild(msgDiv);
                    msgElement = contentSpan;
                } else {
                    msgElement.textContent = fullResponse;
                }
                chatBox.scrollTop = chatBox.scrollHeight;

                await sleep(45);
            }

            // Finalize the message
            if (msgElement) {
                // Remove cursor
                const lastMsg = chatBox.lastElementChild;
                if (lastMsg) {
                    const cursor = lastMsg.querySelector('.cursor');
                    if (cursor) cursor.remove();
                }
                msgElement.textContent = fullResponse;
            }

            conversation.push({ role: 'assistant', text: fullResponse });

        } catch (error) {
            console.error('Generation error:', error);
            if (msgElement) {
                msgElement.textContent = fullResponse + ' [error: ' + error.message + ']';
            } else {
                addAssistantMessage('[Error generating response: ' + error.message + ']');
            }
        }

        isGenerating = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    // --- Event handlers ---
    sendBtn.addEventListener('click', () => {
        const text = userInput.value.trim();
        if (text) generateResponse(text);
    });

    // clicking into the input mid-reply interrupts it — the generation
    // loop notices cancelRequested and stops within one token instead of
    // finishing all 50. mousedown, not focus: focus only fires when
    // focus actually moves TO the box, but the normal flow (type, hit
    // Enter) never moves focus AWAY from it, so a click while it's
    // already focused wouldn't fire a focus event at all. mousedown
    // fires on every click regardless of current focus state.
    userInput.addEventListener('mousedown', () => {
        if (isGenerating) cancelRequested = true;
    });

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    clearBtn.addEventListener('click', () => {
        chatBox.innerHTML = `<div class="message assistant"><span>🤖</span><span>Chat cleared. Enter a message to start.</span></div>`;
        conversation = [];
        if (model) {
            model.seed('');
        }
    });

    resetBtn.addEventListener('click', async () => {
        if (model) {
            model.seed('');
            chatBox.innerHTML = `<div class="message assistant"><span>🤖</span><span>Model reset. Enter a message to start.</span></div>`;
            conversation = [];
            setStatus('Model reset', 'ready');
        }
    });

    tempSlider.addEventListener('input', () => {
        tempDisplay.textContent = parseFloat(tempSlider.value).toFixed(2);
    });

    // --- Initial load ---
    loadModel();
</script>
</body>
</html>
